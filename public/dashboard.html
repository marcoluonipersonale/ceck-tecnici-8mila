<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — PC Check</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-dk:#1e429f;--blue-lt:#eff6ff;--green:#065f46;--green-lt:#ecfdf5;--green-mid:#10b981;--red:#991b1b;--red-lt:#fef2f2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;--f:IBM Plex Sans,sans-serif;--m:IBM Plex Mono,monospace;--sb:220px}
html,body{height:100%;font-family:var(--f);color:var(--gray-900);background:var(--gray-50)}
.layout{display:flex;min-height:100vh}
.sb{width:var(--sb);background:#0f172a;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sb-brand{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-txt{font-size:.88rem;font-weight:700;line-height:1.2}
.sb-txt small{font-size:.7rem;font-weight:400;opacity:.45;display:block}
.sb-nav{padding:10px 8px;flex:1}
.sbi{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:7px;font-size:.85rem;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;margin-bottom:1px;text-decoration:none}
.sbi:hover,.sbi.on{background:rgba(255,255,255,.08);color:#fff}
.sbi.on{background:var(--blue)}
.sb-sep{height:1px;background:rgba(255,255,255,.06);margin:6px 0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.tb-title{font-weight:700;font-size:1rem}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;font:600 .82rem var(--f);cursor:pointer;border:none;transition:all .15s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-dk)}
.btn-out{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200)}.btn-out:hover{background:var(--gray-50)}
.content{flex:1;overflow-y:auto;padding:22px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-label{font-size:.72rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.kpi-val{font:700 1.9rem var(--m);color:var(--gray-900)}
.kpi-val.g{color:#059669}.kpi-val.r{color:#dc2626}
.kpi-sub{font-size:.74rem;color:var(--gray-400);margin-top:3px}
.filters{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.frow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.frow+.frow{margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100)}
.flabel{font-size:.75rem;font-weight:700;color:var(--gray-500);white-space:nowrap}
.fbtn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font:500 .78rem var(--f);color:var(--gray-600);cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.fsep{width:1px;height:18px;background:var(--gray-200);flex-shrink:0}
.date-range{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range label{font-size:.75rem;font-weight:600;color:var(--gray-500)}
.date-range input[type=date]{padding:5px 9px;border:1.5px solid var(--gray-200);border-radius:7px;font:inherit;font-size:.8rem;color:var(--gray-700);cursor:pointer;outline:none}
.date-range input[type=date]:focus{border-color:var(--blue)}
.search-box{position:relative;margin-left:auto}
.search-box input{padding:6px 30px 6px 11px;border:1.5px solid var(--gray-200);border-radius:7px;font:inherit;font-size:.82rem;outline:none;width:190px}
.search-box input:focus{border-color:var(--blue)}
.search-box svg{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none}
.tbl-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:10px;overflow:hidden}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--gray-100)}
.tbl-head-t{font-weight:700;font-size:.88rem}
.tbl-count{font-size:.78rem;color:var(--gray-400)}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:.7rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--gray-700)}
tbody tr{border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--gray-50)}
tbody tr:last-child{border:none}
td{padding:11px 14px;font-size:.85rem;vertical-align:middle}
.td-n{font-weight:600}.td-e{font-size:.76rem;color:var(--gray-400);margin-top:1px}
.td-date{font-family:var(--m);font-size:.77rem;color:var(--gray-500)}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font:700 .72rem var(--f);letter-spacing:.04em}
.b-ok{background:#d1fae5;color:#065f46}.b-no{background:#fee2e2;color:#991b1b}
.ic-ok{color:var(--green-mid)}.ic-fail{color:#f87171}
.td-spd{font-family:var(--m);font-size:.78rem}
.spd-main{font-weight:600;color:var(--gray-900)}
.empty{padding:50px 20px;text-align:center;color:var(--gray-400)}
.empty p{font-size:.88rem}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fi .2s}
.modal{background:#fff;border-radius:14px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh-title{font-weight:700;font-size:.95rem}
.mclose{background:none;border:none;cursor:pointer;color:var(--gray-400);padding:4px;border-radius:6px;transition:all .15s}
.mclose:hover{background:var(--gray-100);color:var(--gray-700)}
.mb{padding:18px 22px 22px}
.mbadge{display:flex;flex-direction:column;align-items:center;padding:18px;border-radius:10px;margin-bottom:18px;text-align:center}
.mbadge.ok{background:var(--green-lt)}.mbadge.fail{background:var(--red-lt)}
.mbtitle{font-size:1.4rem;font-weight:800;letter-spacing:.04em}
.mbadge.ok .mbtitle{color:var(--green)}.mbadge.fail .mbtitle{color:var(--red)}
.mbsub{font-size:.82rem;color:var(--gray-500);margin-top:3px}
.ds-title{font-size:.7rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px}
.dr{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:7px;background:var(--gray-50);margin-bottom:4px;font-size:.85rem}
.dr-lbl{color:var(--gray-500);width:140px;flex-shrink:0;font-size:.78rem}
.dr-val{font-family:var(--m);font-size:.78rem;color:var(--gray-900)}
.del-btn{display:flex;align-items:center;gap:6px;margin-top:16px;padding:8px 14px;background:var(--red-lt);color:var(--red);border:1px solid #fca5a5;border-radius:7px;font:600 .82rem var(--f);cursor:pointer;width:100%;justify-content:center;transition:all .15s}
.del-btn:hover{background:#fee2e2}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .65s linear infinite}
@media(max-width:880px){.sb{display:none}.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="layout">
<aside class="sb">
  <div class="sb-brand">
    <div class="sb-logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
    <div class="sb-txt">HR Portal<small>PC Check v2.3</small></div>
  </div>
  <nav class="sb-nav">
    <a class="sbi on" href="/dashboard.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <div class="sb-sep"></div>
    <a class="sbi" href="/" target="_blank"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Apri tool candidato</a>
  </nav>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-title">Report Candidati</div>
    <div class="spacer"></div>
    <button class="btn btn-out" onclick="exportCsv()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Esporta CSV</button>
    <button class="btn btn-blue" onclick="load()"><svg id="ri" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Aggiorna</button>
  </div>
  <div class="content">
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Totale Candidati<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="kpi-val" id="kv-tot">—</div><div class="kpi-sub" id="kv-period">—</div></div>
      <div class="kpi"><div class="kpi-label">Idonei<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.2"><polyline points="20,6 9,17 4,12"/></svg></div><div class="kpi-val g" id="kv-ok">—</div><div class="kpi-sub" id="kv-ok-pct">—</div></div>
      <div class="kpi"><div class="kpi-label">Non Idonei<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><div class="kpi-val r" id="kv-no">—</div><div class="kpi-sub" id="kv-no-pct">—</div></div>
      <div class="kpi"><div class="kpi-label">Media Download<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div><div class="kpi-val" id="kv-dl">—</div><div class="kpi-sub">Mbps</div></div>
    </div>
    <div class="filters">
      <div class="frow">
        <span class="flabel">Periodo:</span>
        <button class="fbtn on" data-p="all" onclick="fPeriod('all',this)">Tutti</button>
        <button class="fbtn" data-p="today" onclick="fPeriod('today',this)">Oggi</button>
        <button class="fbtn" data-p="7d" onclick="fPeriod('7d',this)">7 giorni</button>
        <button class="fbtn" data-p="30d" onclick="fPeriod('30d',this)">30 giorni</button>
        <div class="fsep"></div>
        <span class="flabel">Esito:</span>
        <button class="fbtn on" data-s="all" onclick="fStatus('all',this)">Tutti</button>
        <button class="fbtn" data-s="ok" onclick="fStatus('ok',this)">Idonei</button>
        <button class="fbtn" data-s="no" onclick="fStatus('no',this)">Non Idonei</button>
        <div class="fsep"></div>
        <span class="flabel">Connessione:</span>
        <button class="fbtn on" data-c="all" onclick="fConn('all',this)">Tutte</button>
        <button class="fbtn" data-c="lan" onclick="fConn('lan',this)">LAN</button>
        <button class="fbtn" data-c="wifi" onclick="fConn('wifi',this)">Wi-Fi</button>
      </div>
      <div class="frow">
        <span class="flabel">Da / A:</span>
        <div class="date-range">
          <label>Dal</label><input type="date" id="f-from" onchange="applyF()"/>
          <label>Al</label><input type="date" id="f-to" onchange="applyF()"/>
          <button class="fbtn" onclick="clearDates()" style="font-size:.72rem">✕ Azzera</button>
        </div>
        <div class="search-box">
          <input type="text" placeholder="Cerca nome o email..." id="f-search" oninput="applyF()"/>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-head-t">Report Recenti</span><span class="tbl-count" id="tbl-cnt">—</span></div>
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">Candidato ↕</th>
            <th onclick="sortBy('date')">Data ↕</th>
            <th onclick="sortBy('idoneo')">Esito ↕</th>
            <th>Connessione</th>
            <th onclick="sortBy('dl')">Download ↕</th>
            <th onclick="sortBy('ping')">Ping ↕</th>
            <th onclick="sortBy('jitter')">Jitter ↕</th>
            <th title="Cuffie USB"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/></svg></th>
            <th title="Webcam"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="10" style="text-align:center;padding:36px;color:var(--gray-400)">Caricamento...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<div class="ov" id="modal" style="display:none" onclick="closeMod(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mh"><span class="mh-title" id="mod-name">Dettaglio</span><button class="mclose" onclick="closeMod()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb" id="mod-body"></div>
  </div>
</div>

<script>
let all=[],F={period:'all',status:'all',conn:'all',from:null,to:null,search:''},SK='date',SD=-1;

async function load(){
  const ic=document.getElementById('ri');ic.classList.add('spin');
  try{const r=await fetch('/api/results');all=await r.json();}
  catch(e){document.getElementById('tbody').innerHTML=`<tr><td colspan="10" style="text-align:center;padding:36px;color:#dc2626">Errore caricamento dati.</td></tr>`;ic.classList.remove('spin');return;}
  renderAll();ic.classList.remove('spin');
}

function renderAll(){
  const shown=getFiltered();
  const dls=all.map(c=>c.results?.speed?.dl).filter(v=>v!=null);
  document.getElementById('kv-tot').textContent=shown.length;
  document.getElementById('kv-period').textContent=all.length===shown.length?'totale':'su '+all.length+' totali';
  document.getElementById('kv-ok').textContent=shown.filter(c=>c.idoneo).length;
  document.getElementById('kv-ok-pct').textContent=shown.length?Math.round(shown.filter(c=>c.idoneo).length/shown.length*100)+'% dei filtrati':'—';
  document.getElementById('kv-no').textContent=shown.filter(c=>!c.idoneo).length;
  document.getElementById('kv-no-pct').textContent=shown.length?Math.round(shown.filter(c=>!c.idoneo).length/shown.length*100)+'% dei filtrati':'—';
  document.getElementById('kv-dl').textContent=dls.length?(dls.reduce((a,b)=>a+b)/dls.length).toFixed(1):'—';
  renderTable(shown);
}

function getFiltered(){
  const now=new Date();
  return all.filter(c=>{
    const d=new Date(c.date);
    if(F.period==='today'){const s=new Date();s.setHours(0,0,0,0);if(d<s)return false;}
    else if(F.period==='7d'){if(now-d>7*864e5)return false;}
    else if(F.period==='30d'){if(now-d>30*864e5)return false;}
    if(F.from&&d<new Date(F.from))return false;
    if(F.to){const t=new Date(F.to);t.setHours(23,59,59,999);if(d>t)return false;}
    if(F.status==='ok'&&!c.idoneo)return false;
    if(F.status==='no'&&c.idoneo)return false;
    if(F.conn==='lan'&&!c.results?.conn?.isWired)return false;
    if(F.conn==='wifi'&&c.results?.conn?.isWired)return false;
    if(F.search){const s=F.search;if(!(c.name||'').toLowerCase().includes(s)&&!(c.email||'').toLowerCase().includes(s))return false;}
    return true;
  }).sort((a,b)=>{
    if(SK==='name')return(a.name||'').localeCompare(b.name||'')*SD;
    if(SK==='date')return(new Date(a.date)-new Date(b.date))*SD;
    if(SK==='idoneo')return((a.idoneo?1:0)-(b.idoneo?1:0))*SD;
    if(SK==='dl')return((a.results?.speed?.dl||0)-(b.results?.speed?.dl||0))*SD;
    if(SK==='ping')return((a.results?.speed?.ping||0)-(b.results?.speed?.ping||0))*SD;
    if(SK==='jitter')return((a.results?.speed?.jitter||0)-(b.results?.speed?.jitter||0))*SD;
    return 0;
  });
}

function renderTable(rows){
  document.getElementById('tbl-cnt').textContent=rows.length+' candidat'+(rows.length===1?'o':'i');
  if(!rows.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="10"><div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Nessun risultato.</p></div></td></tr>`;return;}
  const okSvg=`<svg class="ic-ok" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`;
  const noSvg=`<svg class="ic-fail" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  document.getElementById('tbody').innerHTML=rows.map(c=>{
    const r=c.results||{};
    const d=new Date(c.date);
    const ds=d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    const pingColor=r.speed?.ping<50?'color:#10b981':r.speed?.ping<100?'color:#f59e0b':'color:#ef4444';
    const jitterColor=r.speed?.jitter<20?'color:#10b981':r.speed?.jitter<50?'color:#f59e0b':'color:#ef4444';
    const connIco=r.conn?.isWired
      ?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`
      :`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M10.54 16a6 6 0 0 1 2.92 0"/><circle cx="12" cy="20" r="1"/></svg>`;
    return `<tr onclick="openMod('${c.id}')">
      <td><div class="td-n">${esc(c.name)}</div><div class="td-e">${esc(c.email)}</div></td>
      <td class="td-date">${ds}</td>
      <td><span class="badge ${c.idoneo?'b-ok':'b-no'}">${c.idoneo?'IDONEO':'NON IDONEO'}</span></td>
      <td style="text-align:center">${connIco} <span style="font-size:.74rem;color:var(--gray-500);margin-left:3px">${r.conn?.isWired?'LAN':'Wi-Fi'}</span></td>
      <td class="td-spd"><span class="spd-main">${r.speed?.dl?.toFixed(1)||'—'}</span> <span style="font-size:.7rem;color:var(--gray-400)">Mbps</span></td>
      <td class="td-spd" style="${pingColor}">${r.speed?.ping||'—'}<span style="font-size:.7rem;opacity:.7"> ms</span></td>
      <td class="td-spd" style="${jitterColor}">${r.speed?.jitter||'—'}<span style="font-size:.7rem;opacity:.7"> ms</span></td>
      <td style="text-align:center">${r.hs?.ok?okSvg:noSvg}</td>
      <td style="text-align:center">${r.cam?.ok?okSvg:noSvg}</td>
      <td style="color:var(--gray-300);text-align:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg></td>
    </tr>`;
  }).join('');
}

function fPeriod(v,btn){F.period=v;document.querySelectorAll('[data-p]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyF();}
function fStatus(v,btn){F.status=v;document.querySelectorAll('[data-s]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyF();}
function fConn(v,btn){F.conn=v;document.querySelectorAll('[data-c]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyF();}
function applyF(){F.from=document.getElementById('f-from').value||null;F.to=document.getElementById('f-to').value||null;F.search=document.getElementById('f-search').value.toLowerCase().trim();renderAll();}
function clearDates(){document.getElementById('f-from').value='';document.getElementById('f-to').value='';F.from=null;F.to=null;applyF();}
function sortBy(k){if(SK===k)SD*=-1;else{SK=k;SD=-1;}renderTable(getFiltered());}

function openMod(id){
  const c=all.find(x=>x.id===id);if(!c)return;
  const r=c.results||{};
  document.getElementById('mod-name').textContent=c.name;
  const d=new Date(c.date).toLocaleString('it-IT');
  const row=(lbl,val,ok)=>{
    const ic=ok===true?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`:ok===false?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`:'';
    return `<div class="dr">${ic}<span class="dr-lbl">${lbl}</span><span class="dr-val">${val||'—'}</span></div>`;
  };
  document.getElementById('mod-body').innerHTML=`
    <div class="mbadge ${c.idoneo?'ok':'fail'}"><div class="mbtitle">${c.idoneo?'IDONEO':'NON IDONEO'}</div><div class="mbsub">${esc(c.email)} · ${d}</div></div>
    <div class="ds-title">Sistema</div>
    ${row('OS e Hardware',r.os?.detail,r.os?.ok)}${row('Tipo connessione',r.conn?.type,null)}
    <div class="ds-title">Connessione Internet</div>
    ${row('Download',(r.speed?.dl?.toFixed(2)||'—')+' Mbps',r.speed?.dl>=10)}
    ${row('Upload',(r.speed?.ul?.toFixed(2)||'—')+' Mbps',null)}
    ${row('Ping',(r.speed?.ping||'—')+' ms',(r.speed?.ping||999)<=100)}
    ${row('Jitter',(r.speed?.jitter||'—')+' ms',(r.speed?.jitter||999)<=50)}
    <div class="ds-title">Periferiche</div>
    ${row('Webcam',r.cam?.detail,r.cam?.ok)}
    ${row('Cuffie',r.hs?.detail+(r.hs?.usb?' (USB)':r.hs?.usb===false?' (non USB)':'')+(r.hs?.manual?' — confermato manualmente':''),r.hs?.ok)}
    ${row('Microfono',r.mic?.ok?'Segnale rilevato':'Nessun segnale',r.mic?.ok)}
    ${row('Test Audio',r.audio?.ok?'Suono sentito':'Suono non sentito',r.audio?.ok)}
    <button class="del-btn" onclick="delEntry('${c.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/></svg>Elimina questo record</button>`;
  document.getElementById('modal').style.display='flex';
}

async function delEntry(id){if(!confirm('Eliminare questo record?'))return;await fetch('/api/results/'+id,{method:'DELETE'});closeMod();load();}
function closeMod(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').style.display='none';}

function exportCsv(){
  const rows=getFiltered();
  const h='Nome,Email,Data,Esito,Connessione,Download (Mbps),Ping (ms),Jitter (ms),Cuffie USB,Webcam,Microfono,Audio,OS';
  const lines=[h,...rows.map(c=>{const r=c.results||{};return[`"${c.name||''}"`,`"${c.email||''}"`,`"${new Date(c.date).toLocaleString('it-IT')}"`,c.idoneo?'IDONEO':'NON IDONEO',r.conn?.isWired?'LAN':'Wi-Fi',r.speed?.dl?.toFixed(2)||'',r.speed?.ping||'',r.speed?.jitter||'',r.hs?.ok?'SI':'NO',r.cam?.ok?'SI':'NO',r.mic?.ok?'SI':'NO',r.audio?.ok?'SI':'NO',`"${r.os?.detail||''}"`].join(',');})];
  const blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`pc-check-${new Date().toISOString().slice(0,10)}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
load();
</script>
